name: Build and deploy Node.js app to Azure Web App - health-monitoring-hub-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Build (if present)
        working-directory: backend
        run: npm run build --if-present

      - name: Test (if present)
        working-directory: backend
        run: npm run test --if-present

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip package
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_13C5DF515F31418EB5EED2DAD21451CF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DCDA6D8DB477412A89785B3E43A5D7A1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E303C93553E549F19ACC8FC7B6FB617D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'health-monitoring-hub-backend'
          slot-name: 'Production'
          package: release.zip
